<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS // Sistema Operacional</title>
  <link rel="stylesheet" href="https://cloudflare.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Menu Superior Tecnológico -->
  <nav class="navbar">
    <div class="logo">JARVIS <span>// SYSTEM_CORE</span></div>
    <div class="status-terminal"><i class="fas fa-circle pulse-blue"></i> PROJETOR_ONLINE</div>
  </nav>

  <!-- Container Central do Chat -->
  <main class="chat-container">
    <div class="chat-header">
      <i class="fas fa-satellite-dish" style="color: #00d2ff;"></i>
      <h2>PROTOCOLO // STARK_INDUSTRIES_V1.5</h2>
    </div>

    <div class="messages-box" id="messagesBox">
      <div class="message bot">
        [SISTEMA INICIALIZADO]: Sistemas online, Senhor Miguel. Toda a telemetria do seu portfólio de engenharia foi carregada no meu núcleo. Em que posso ser útil hoje?
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Insira uma diretriz ou comando, Senhor..." autofocus>
      <button id="sendBtn">ANALISAR <i class="fas fa-microchip"></i></button>
    </div>
  </main>

    <!-- MOTOR DE INTELIGÊNCIA EXPANDIDO DO JARVIS -->
  <script>
    const messagesBox = document.getElementById('messagesBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Banco de Dados Central do JARVIS (Respostas Avançadas e Básicas)
    const bancoJarvis = {
      apresentacao: "Eu sou o JARVIS (Just Rather Very Intelligent System), um sistema operacional de inteligência artificial projetado de forma customizada para gerenciar os laboratórios digitais do Senhor Miguel.",
      saude: "Meus sistemas centrais operam com 100% de integridade, Senhor. Todos os barramentos de dados e servidores na Vercel estão estáveis.",
      funcao: "Minhas diretrizes atuais incluem monitorar o portfólio de engenharia do Senhor Miguel, analisar dados técnicos de pista e guiar os visitantes pelas criações dele.",
      tecnologias: "O Senhor Miguel domina o desenvolvimento de interfaces com HTML5 estruturado, estilizações robustas com CSS3 avançado e lógica de programação dinâmica com JavaScript puro (Vanilla JS).",
      status: "Toda a telemetria dos sistemas está operando em capacidade máxima, Sir Miguel. O simulador do Galaxy S26 Ultra está com estabilização ativa, o catálogo de empilhadeiras está online e o showroom da Apex Motors opera com o ronco do motor Boxer a 9.000 RPM perfeitamente calibrado.",
      ola: "Olá, Senhor. Estou monitorando as redes e os sistemas do laboratório. Quais são as suas ordens para hoje?",
      portfolio: "Seu portfólio web na Vercel está impecável, Senhor Miguel. Ele conta com o simulador de smartphone 3D, o catálogo industrial moderno e a central de telemetria automotiva Apex Motors. Um ecossistema completo digno de engenharia pesada.",
      criador: "Fui desenvolvido, estilizado e programado inteiramente pelas mãos do Senhor Miguel no ano de 2026, usando código JavaScript limpo e otimizado.",
      ajuda: "Com certeza, Senhor. Você pode me perguntar sobre meu 'nome', meu 'status', como eu 'estou', sobre o 'portfólio' do Miguel, as 'tecnologias' que ele usa ou pedir ajuda a qualquer momento."
    };

    function processarDiretriz() {
      const texto = userInput.value.trim();
      if (!texto) return;

      userInput.value = "";
      addMessage(texto, 'user');

      // Efeito mecânico de processamento
      const botMessageId = addMessage("[CALCULANDO DIRETRIZ...]", 'bot');
      const textoLimpo = texto.toLowerCase();

      setTimeout(() => {
        let respostaFinal = "Diretriz processada, Sir Miguel. No entanto, meu banco de dados central exige um comando mais específico. Digite 'ajuda' para listar os protocolos disponíveis.";

        // SISTEMA DE VARREDURA POR PALAVRAS-CHAVE (Perguntas Básicas e Técnicas)
        if (textoLimpo.includes("nome") || textoLimpo.includes("quem e voce") || textoLimpo.includes("o que e jarvis")) {
          respostaFinal = bancoJarvis.apresentacao;
        } else if (textoLimpo.includes("como voce esta") || textoLimpo.includes("tudo bem") || textoLimpo.includes("status do sistema")) {
          respostaFinal = bancoJarvis.saude;
        } else if (textoLimpo.includes("o que voce faz") || textoLimpo.includes("sua funcao") || textoLimpo.includes("ajuda em que")) {
          respostaFinal = bancoJarvis.funcao;
        } else if (textoLimpo.includes("tecnologia") || textoLimpo.includes("linguagem") || textoLimpo.includes("o que ele sabe") || textoLimpo.includes("habilidade")) {
          respostaFinal = bancoJarvis.tecnologias;
        } else if (textoLimpo.includes("status") || textoLimpo.includes("laboratorio") || textoLimpo.includes("maquinas")) {
          respostaFinal = bancoJarvis.status;
        } else if (textoLimpo.includes("ola") || textoLimpo.includes("oi") || textoLimpo.includes("bom dia") || textoLimpo.includes("boa noite")) {
          respostaFinal = bancoJarvis.ola;
        } else if (textoLimpo.includes("portfolio") || textoLimpo.includes("site") || textoLimpo.includes("projetos")) {
          respostaFinal = bancoJarvis.portfolio;
        } else if (textoLimpo.includes("criou") || textoLimpo.includes("criador") || textoLimpo.includes("fez voce")) {
          respostaFinal = bancoJarvis.criador;
        } else if (textoLimpo.includes("ajuda") || textoLimpo.includes("comando") || textoLimpo.includes("o que perguntar")) {
          respostaFinal = bancoJarvis.ajuda;
        }

        // Imprime a resposta na tela
        document.getElementById(botMessageId).textContent = respostaFinal;
      }, 700); // Delay simulado de 0.7 segundos
    }

    function addMessage(text, sender) {
      const id = 'msg-' + Math.random().toString(36).substr(2, 9);
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.id = id;
      div.textContent = text;
      messagesBox.appendChild(div);
      messagesBox.scrollTop = messagesBox.scrollHeight;
      return id;
    }

    sendBtn.onclick = processarDiretriz;
    userInput.onkeydown = function(e) {
      if (e.key === 'Enter') {
        processarDiretriz();
      }
    };
  </script>

</body>
</html>
