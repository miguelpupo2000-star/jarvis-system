<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS // Sistema Operacional</title>
  <link rel="stylesheet" href="https://cloudflare.com">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Menu Superior Tecnológico -->
  <nav class="navbar">
    <div class="logo">JARVIS <span>// SYSTEM_CORE</span></div>
    <div class="status-terminal"><i class="fas fa-circle pulse-blue"></i> PROJETOR_ONLINE</div>
  </nav>

  <!-- Container Central do Chat -->
  <main class="chat-container">
    <div class="chat-header">
      <i class="fas fa-satellite-dish" style="color: #00d2ff;"></i>
      <h2>PROTOCOLO // STARK_INDUSTRIES_V1.5</h2>
    </div>

    <div class="messages-box" id="messagesBox">
      <div class="message bot">
        [SISTEMA INICIALIZADO]: Sistemas online, Senhor Miguel. Toda a telemetria do seu portfólio de engenharia foi carregada no meu núcleo. Em que posso ser útil hoje?
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Insira uma diretriz ou comando, Senhor..." autofocus>
      <button id="sendBtn">ANALISAR <i class="fas fa-microchip"></i></button>
    </div>
  </main>

  <!-- SCRIPT LOCAL CORRIGIDO E LIVRE DE ERROS DE SINTAXE -->
  <script>
    const messagesBox = document.getElementById('messagesBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    async function enviarMensagem() {
      const texto = userInput.value.trim();
      if (!texto) return;

      // 1. Limpa o campo de texto e joga o balão azul imediatamente
      userInput.value = "";
      addMessage(texto, 'user');

      // 2. Cria o balão de carregamento do Jarvis
      const botMessageId = addMessage("[CALCULANDO DIRETRIZ...]", 'bot');

      try {
        // Consulta a API de back-end hospedada na Vercel
        const respostaHTTP = await fetch('/api/chat', {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensagem: texto })
        });

        const dados = await respostaHTTP.json();
        
        // Exibe a resposta final ou trata erros retornados pela Groq
        if (dados && dados.resposta) {
          document.getElementById(botMessageId).textContent = dados.resposta;
        } else {
          document.getElementById(botMessageId).textContent = "[SISTEMA]: Retorno inesperado do núcleo. Verifique os logs na Vercel.";
        }

      } catch (error) {
        console.error(error);
        document.getElementById(botMessageId).textContent = `[SISTEMA]: Falha na comunicação externa com a rota /api/chat.`;
      }
    }

    function addMessage(text, sender) {
      const id = 'msg-' + Math.random().toString(36).substr(2, 9);
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.id = id;
      div.textContent = text;
      messagesBox.appendChild(div);
      messagesBox.scrollTop = messagesBox.scrollHeight;
      return id;
    }

    // Ativa os gatilhos físicos de clique e Enter de forma limpa
    sendBtn.onclick = enviarMensagem;
    userInput.onkeydown = function(e) {
      if (e.key === 'Enter') {
        enviarMensagem();
      }
    };
  </script>
</body>
</html>
